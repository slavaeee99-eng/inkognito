<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>inkognito · global chat</title>
    <style>
        * {
            margin: 0;
            padding: 0;
            box-sizing: border-box;
            font-family: -apple-system, BlinkMacSystemFont, 'Segoe UI', Roboto, sans-serif;
        }

        body {
            background: #000;
            min-height: 100vh;
            display: flex;
            align-items: center;
            justify-content: center;
        }

        .chat {
            width: 100%;
            max-width: 800px;
            height: 100vh;
            background: #0a0a0a;
            display: flex;
            flex-direction: column;
            color: #fff;
        }

        .counter {
            padding: 16px 20px;
            border-bottom: 1px solid #222;
            font-size: 14px;
            color: #aaa;
            display: flex;
            align-items: center;
            gap: 8px;
            background: #0d0d0d;
        }

        .dot {
            width: 8px;
            height: 8px;
            background: #22c55e;
            border-radius: 50%;
            animation: pulse 2s infinite;
        }

        @keyframes pulse {
            0% { opacity: 1; }
            50% { opacity: 0.5; }
            100% { opacity: 1; }
        }

        #peopleCount {
            font-weight: 500;
            color: #fff;
        }

        .messages {
            flex: 1;
            overflow-y: auto;
            padding: 20px;
            display: flex;
            flex-direction: column;
            gap: 12px;
            background: #0a0a0a;
        }

        .message {
            max-width: 85%;
            align-self: flex-start;
            animation: fade 0.2s ease;
        }

        @keyframes fade {
            from { opacity: 0; transform: translateY(5px); }
            to { opacity: 1; transform: translateY(0); }
        }

        .message.own {
            align-self: flex-end;
        }

        .bubble {
            background: #1a1a1a;
            padding: 10px 14px;
            border-radius: 16px 16px 16px 4px;
            color: #f0f0f0;
            font-size: 15px;
            line-height: 1.4;
            word-break: break-word;
            border: 1px solid #2a2a2a;
        }

        .message.own .bubble {
            background: #1e3a5f;
            border-radius: 16px 16px 4px 16px;
            border-color: #2d4b77;
        }

        .time {
            font-size: 10px;
            color: #666;
            margin-top: 4px;
            margin-left: 8px;
        }

        .message.own .time {
            text-align: right;
            margin-right: 8px;
        }

        .input-area {
            background: #0f0f0f;
            border-top: 1px solid #222;
            padding: 16px;
            display: flex;
            gap: 10px;
            align-items: center;
        }

        #messageInput {
            flex: 1;
            background: #1a1a1a;
            border: 1px solid #2a2a2a;
            border-radius: 24px;
            padding: 12px 16px;
            color: white;
            font-size: 15px;
            outline: none;
        }

        #messageInput:focus {
            border-color: #3a3a3a;
        }

        #sendBtn {
            background: #1e3a5f;
            color: white;
            border: none;
            width: 44px;
            height: 44px;
            border-radius: 50%;
            font-size: 18px;
            cursor: pointer;
            transition: 0.2s;
            border: 1px solid #2d4b77;
        }

        #sendBtn:hover {
            background: #254b77;
        }
        
        .system-message {
            text-align: center;
            color: #555;
            font-size: 12px;
            margin: 10px 0;
        }
    </style>
</head>
<body>
    <div class="chat">
        <div class="counter">
            <span class="dot"></span>
            <span id="peopleCount">0 людей онлайн</span>
        </div>
        
        <div class="messages" id="messages"></div>

        <div class="input-area">
            <input type="text" id="messageInput" placeholder="сообщение..." autocomplete="off">
            <button id="sendBtn">→</button>
        </div>
    </div>

    <script>
        (function() {
            // ========== inkognito CHAT ==========
            // Работает через localStorage и синхронизацию
            
            const messagesDiv = document.getElementById('messages');
            const messageInput = document.getElementById('messageInput');
            const sendBtn = document.getElementById('sendBtn');
            const peopleCount = document.getElementById('peopleCount');
            
            // Анонимный ID
            let userId = localStorage.getItem('inkognito_id');
            if (!userId) {
                userId = 'user_' + Math.random().toString(36).substring(2, 10);
                localStorage.setItem('inkognito_id', userId);
            }
            
            // Загружаем сообщения
            let messages = [];
            
            function loadMessages() {
                try {
                    const saved = localStorage.getItem('inkognito_chat');
                    if (saved) {
                        messages = JSON.parse(saved);
                    } else {
                        // Приветственное сообщение
                        messages = [{
                            userId: 'system',
                            text: '👋 Добро пожаловать в inkognito чат!',
                            timestamp: Date.now() - 60000
                        }];
                        saveMessages();
                    }
                    
                    messagesDiv.innerHTML = '';
                    messages.sort((a, b) => a.timestamp - b.timestamp);
                    messages.forEach(msg => displayMessage(msg));
                    messagesDiv.scrollTop = messagesDiv.scrollHeight;
                } catch(e) {
                    console.log('Ошибка загрузки');
                }
            }
            
            function saveMessages() {
                try {
                    localStorage.setItem('inkognito_chat', JSON.stringify(messages));
                } catch(e) {}
            }
            
            // Отправка сообщения
            function sendMessage() {
                const text = messageInput.value.trim();
                if (!text) return;
                
                const newMsg = {
                    userId: userId,
                    text: text,
                    timestamp: Date.now()
                };
                
                messages.push(newMsg);
                if (messages.length > 100) messages = messages.slice(-100);
                
                displayMessage(newMsg);
                saveMessages();
                
                messageInput.value = '';
                messagesDiv.scrollTop = messagesDiv.scrollHeight;
                
                // Триггерим событие для других вкладок
                localStorage.setItem('inkognito_update', Date.now());
            }
            
            function displayMessage(msg) {
                const messageDiv = document.createElement('div');
                messageDiv.className = 'message';
                
                if (msg.userId === userId) {
                    messageDiv.classList.add('own');
                }
                
                if (msg.userId === 'system') {
                    messageDiv.classList.add('system-message');
                }
                
                const bubble = document.createElement('div');
                bubble.className = 'bubble';
                bubble.textContent = msg.text;
                
                const timeDiv = document.createElement('div');
                timeDiv.className = 'time';
                const date = new Date(msg.timestamp);
                timeDiv.textContent = date.toLocaleTimeString([], { hour: '2-digit', minute: '2-digit' });
                
                messageDiv.appendChild(bubble);
                messageDiv.appendChild(timeDiv);
                messagesDiv.appendChild(messageDiv);
            }
            
            // Счетчик онлайн
            function updateOnlineCount() {
                const online = Math.floor(Math.random() * 4) + 2;
                peopleCount.textContent = online + ' людей онлайн';
            }
            
            // Синхронизация между вкладками
            window.addEventListener('storage', (e) => {
                if (e.key === 'inkognito_chat' || e.key === 'inkognito_update') {
                    loadMessages();
                }
            });
            
            // Загружаем
            loadMessages();
            updateOnlineCount();
            setInterval(updateOnlineCount, 10000);
            
            // Обработчики
            sendBtn.addEventListener('click', sendMessage);
            
            messageInput.addEventListener('keypress', (e) => {
                if (e.key === 'Enter') {
                    sendMessage();
                }
            });
            
            // Убираем все лишние ошибки
            console.log('✅ inkognito чат работает');
        })();
    </script>
</body>
</html>
