<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>global chat · работает</title>
    <style>
        * {
            margin: 0;
            padding: 0;
            box-sizing: border-box;
            font-family: -apple-system, BlinkMacSystemFont, 'Segoe UI', Roboto, sans-serif;
        }

        body {
            background: #000;
            min-height: 100vh;
            display: flex;
            align-items: center;
            justify-content: center;
        }

        .chat {
            width: 100%;
            max-width: 800px;
            height: 100vh;
            background: #0a0a0a;
            display: flex;
            flex-direction: column;
            color: #fff;
        }

        .counter {
            padding: 16px 20px;
            border-bottom: 1px solid #222;
            font-size: 14px;
            color: #aaa;
            display: flex;
            align-items: center;
            gap: 8px;
            background: #0d0d0d;
        }

        .dot {
            width: 8px;
            height: 8px;
            background: #22c55e;
            border-radius: 50%;
            animation: pulse 2s infinite;
        }

        @keyframes pulse {
            0% { opacity: 1; }
            50% { opacity: 0.5; }
            100% { opacity: 1; }
        }

        #peopleCount {
            font-weight: 500;
            color: #fff;
        }

        .messages {
            flex: 1;
            overflow-y: auto;
            padding: 20px;
            display: flex;
            flex-direction: column;
            gap: 12px;
            background: #0a0a0a;
        }

        .message {
            max-width: 85%;
            align-self: flex-start;
        }

        .message.own {
            align-self: flex-end;
        }

        .bubble {
            background: #1a1a1a;
            padding: 10px 14px;
            border-radius: 16px 16px 16px 4px;
            color: #f0f0f0;
            font-size: 15px;
            line-height: 1.4;
            word-break: break-word;
            border: 1px solid #2a2a2a;
        }

        .message.own .bubble {
            background: #1e3a5f;
            border-radius: 16px 16px 4px 16px;
            border-color: #2d4b77;
        }

        .time {
            font-size: 10px;
            color: #666;
            margin-top: 4px;
            margin-left: 8px;
        }

        .message.own .time {
            text-align: right;
            margin-right: 8px;
        }

        .input-area {
            background: #0f0f0f;
            border-top: 1px solid #222;
            padding: 16px;
            display: flex;
            gap: 10px;
            align-items: center;
        }

        #messageInput {
            flex: 1;
            background: #1a1a1a;
            border: 1px solid #2a2a2a;
            border-radius: 24px;
            padding: 12px 16px;
            color: white;
            font-size: 15px;
            outline: none;
        }

        #messageInput:focus {
            border-color: #3a3a3a;
        }

        #sendBtn {
            background: #1e3a5f;
            color: white;
            border: none;
            width: 44px;
            height: 44px;
            border-radius: 50%;
            font-size: 18px;
            cursor: pointer;
            transition: 0.2s;
            border: 1px solid #2d4b77;
        }

        #sendBtn:hover {
            background: #254b77;
        }
    </style>
</head>
<body>
    <div class="chat">
        <div class="counter">
            <span class="dot"></span>
            <span id="peopleCount">0 людей онлайн</span>
        </div>
        
        <div class="messages" id="messages"></div>

        <div class="input-area">
            <input type="text" id="messageInput" placeholder="сообщение..." autocomplete="off">
            <button id="sendBtn">→</button>
        </div>
    </div>

    <script>
        (function() {
            // ========== ЧАТ С СОЗДАНИЕМ НОВОГО БИНА ==========
            
            // ТВОИ ДАННЫЕ
            const MASTER_KEY = '$2a$10$IFjsrEdaydykGS8Vx0adXO2XMnIfWxQU9djHwvruZw2ofFTj4BQ36';
            
            const messagesDiv = document.getElementById('messages');
            const messageInput = document.getElementById('messageInput');
            const sendBtn = document.getElementById('sendBtn');
            const peopleCount = document.getElementById('peopleCount');
            
            // Анонимный ID
            let userId = localStorage.getItem('chatUserId');
            if (!userId) {
                userId = 'user_' + Math.random().toString(36).substring(2, 10);
                localStorage.setItem('chatUserId', userId);
            }
            
            let messages = [];
            let BIN_ID = localStorage.getItem('chat_bin_id');
            
            // СОЗДАЕМ НОВЫЙ БИН ЕСЛИ НУЖНО
            async function createBin() {
                try {
                    const response = await fetch('https://api.jsonbin.io/v3/b', {
                        method: 'POST',
                        headers: {
                            'Content-Type': 'application/json',
                            'X-Master-Key': MASTER_KEY
                        },
                        body: JSON.stringify({ 
                            messages: [
                                {
                                    userId: 'system',
                                    text: '👋 Добро пожаловать в чат!',
                                    timestamp: Date.now()
                                }
                            ] 
                        })
                    });
                    
                    if (response.ok) {
                        const data = await response.json();
                        BIN_ID = data.metadata.id;
                        localStorage.setItem('chat_bin_id', BIN_ID);
                        console.log('✅ Создан новый бин:', BIN_ID);
                        return true;
                    }
                } catch (e) {
                    console.log('Ошибка создания бина:', e);
                }
                return false;
            }
            
            // ЗАГРУЗКА СООБЩЕНИЙ
            async function loadMessages() {
                if (!BIN_ID) {
                    BIN_ID = localStorage.getItem('chat_bin_id');
                    if (!BIN_ID) {
                        if (await createBin()) {
                            loadMessages();
                        } else {
                            loadLocalMessages();
                        }
                        return;
                    }
                }
                
                try {
                    const response = await fetch(`https://api.jsonbin.io/v3/b/${BIN_ID}/latest`, {
                        headers: {
                            'X-Master-Key': MASTER_KEY
                        }
                    });
                    
                    if (response.ok) {
                        const data = await response.json();
                        messages = data.record.messages || [];
                        
                        messagesDiv.innerHTML = '';
                        messages.sort((a, b) => a.timestamp - b.timestamp);
                        messages.forEach(msg => displayMessage(msg));
                        messagesDiv.scrollTop = messagesDiv.scrollHeight;
                        console.log('✅ Загружено сообщений:', messages.length);
                    } else {
                        console.log('Ошибка загрузки, создаю новый бин');
                        if (await createBin()) {
                            loadMessages();
                        } else {
                            loadLocalMessages();
                        }
                    }
                } catch (e) {
                    console.log('Ошибка:', e);
                    loadLocalMessages();
                }
            }
            
            // ОТПРАВКА СООБЩЕНИЯ
            async function sendMessage(text) {
                if (!text.trim()) return;
                
                const newMessage = {
                    userId: userId,
                    text: text,
                    timestamp: Date.now()
                };
                
                // Добавляем в массив
                messages.push(newMessage);
                if (messages.length > 100) messages = messages.slice(-100);
                
                // Показываем сразу
                displayMessage(newMessage);
                messageInput.value = '';
                messagesDiv.scrollTop = messagesDiv.scrollHeight;
                
                // Сохраняем в JSONBin
                if (BIN_ID) {
                    try {
                        const response = await fetch(`https://api.jsonbin.io/v3/b/${BIN_ID}`, {
                            method: 'PUT',
                            headers: {
                                'Content-Type': 'application/json',
                                'X-Master-Key': MASTER_KEY
                            },
                            body: JSON.stringify({ messages: messages })
                        });
                        
                        if (response.ok) {
                            console.log('✅ Сообщение сохранено');
                        } else {
                            console.log('❌ Ошибка сохранения');
                            saveLocalMessages();
                        }
                    } catch (e) {
                        console.log('Ошибка отправки:', e);
                        saveLocalMessages();
                    }
                } else {
                    saveLocalMessages();
                }
            }
            
            // Локальное хранилище
            function saveLocalMessages() {
                localStorage.setItem('chat_backup', JSON.stringify(messages));
            }
            
            function loadLocalMessages() {
                try {
                    const saved = localStorage.getItem('chat_backup');
                    if (saved) {
                        messages = JSON.parse(saved);
                        messagesDiv.innerHTML = '';
                        messages.sort((a, b) => a.timestamp - b.timestamp);
                        messages.forEach(msg => displayMessage(msg));
                    } else {
                        // Добавляем приветственное сообщение
                        const welcomeMsg = {
                            userId: 'system',
                            text: '👋 Чат работает локально. Подключи интернет для облака!',
                            timestamp: Date.now()
                        };
                        messages = [welcomeMsg];
                        displayMessage(welcomeMsg);
                        saveLocalMessages();
                    }
                } catch(e) {}
            }
            
            // Отображение сообщения
            function displayMessage(msg) {
                const messageDiv = document.createElement('div');
                messageDiv.className = 'message';
                
                if (msg.userId === userId) {
                    messageDiv.classList.add('own');
                }
                if (msg.userId === 'system') {
                    messageDiv.style.opacity = '0.7';
                }
                
                const bubble = document.createElement('div');
                bubble.className = 'bubble';
                bubble.textContent = msg.text;
                
                const timeDiv = document.createElement('div');
                timeDiv.className = 'time';
                const date = new Date(msg.timestamp || Date.now());
                timeDiv.textContent = date.toLocaleTimeString([], { hour: '2-digit', minute: '2-digit' });
                
                messageDiv.appendChild(bubble);
                messageDiv.appendChild(timeDiv);
                messagesDiv.appendChild(messageDiv);
            }
            
            // Счетчик онлайн (просто цифра)
            let onlineCount = 1;
            setInterval(() => {
                onlineCount = 1 + Math.floor(Math.random() * 4);
                peopleCount.textContent = onlineCount + ' людей онлайн';
            }, 5000);
            
            // Загружаем сообщения
            loadMessages();
            
            // Обновляем каждые 3 секунды
            setInterval(loadMessages, 3000);
            
            // Отправка
            sendBtn.addEventListener('click', () => {
                sendMessage(messageInput.value);
            });
            
            messageInput.addEventListener('keypress', (e) => {
                if (e.key === 'Enter') {
                    sendMessage(messageInput.value);
                }
            });
            
            // Стартовый счетчик
            peopleCount.textContent = '3 людей онлайн';
            
        })();
    </script>
</body>
</html>
